<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700;800&amp;display=swap');
      .mono { font-family: 'JetBrains Mono', 'Courier New', monospace; }
    </style>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="#0a0a0f"/>

  <!-- Subtle grid lines -->
  <g stroke="#ffffff" stroke-opacity="0.02" stroke-width="1">
    <line x1="0" y1="105" x2="1200" y2="105"/>
    <line x1="0" y1="210" x2="1200" y2="210"/>
    <line x1="0" y1="315" x2="1200" y2="315"/>
    <line x1="0" y1="420" x2="1200" y2="420"/>
    <line x1="0" y1="525" x2="1200" y2="525"/>
    <line x1="150" y1="0" x2="150" y2="630"/>
    <line x1="300" y1="0" x2="300" y2="630"/>
    <line x1="450" y1="0" x2="450" y2="630"/>
    <line x1="600" y1="0" x2="600" y2="630"/>
    <line x1="750" y1="0" x2="750" y2="630"/>
    <line x1="900" y1="0" x2="900" y2="630"/>
    <line x1="1050" y1="0" x2="1050" y2="630"/>
  </g>

  <!-- Terminal window card -->
  <rect x="80" y="80" width="1040" height="470" rx="10" ry="10" fill="#0f0f1a" stroke="#1e1e30" stroke-width="1.5"/>

  <!-- Title bar -->
  <rect x="80" y="80" width="1040" height="44" rx="10" ry="10" fill="#13131f"/>
  <rect x="80" y="104" width="1040" height="20" fill="#13131f"/>

  <!-- Traffic light dots -->
  <circle cx="116" cy="102" r="7" fill="#ff5f57"/>
  <circle cx="140" cy="102" r="7" fill="#febc2e"/>
  <circle cx="164" cy="102" r="7" fill="#28c840"/>

  <!-- Title bar text -->
  <text x="600" y="107" class="mono" font-size="13" fill="#707080" text-anchor="middle" dominant-baseline="middle">sarveshbhatnagar@blog:~$</text>

  <!-- Main content area -->
  <!-- Prompt line -->
  <text x="120" y="188" class="mono" font-size="18" fill="#707080">~/sb$</text>
  <text x="178" y="188" class="mono" font-size="18" fill="#e0e0e0"> cat what-is-the-best-way-to-use-coding-agents.md</text>

  <!-- Green accent line -->
  <rect x="120" y="210" width="3" height="120" fill="#00ff88" opacity="0.6"/>

  <!-- Big name display -->
  <text x="144" y="255" class="mono" font-size="58" font-weight="800" fill="#e0e0e0" letter-spacing="-1">sarvesh</text>
  <text x="144" y="318" class="mono" font-size="58" font-weight="800" fill="#00ff88" letter-spacing="-1">bhatnagar</text>

  <!-- Separator -->
  <line x1="120" y1="348" x2="1080" y2="348" stroke="#1e1e30" stroke-width="1.5"/>

  <!-- Post title line -->
  <text x="120" y="390" class="mono" font-size="15" fill="#ffb347">// post</text>
  <text x="185" y="390" class="mono" font-size="15" fill="#e0e0e0"> ›  What is the Best Way to Use Coding Agents?</text>

  <!-- Tags line -->
  <text x="120" y="425" class="mono" font-size="14" fill="#707080">tags</text>
  <text x="160" y="425" class="mono" font-size="14" fill="#1e1e30"> [</text>

  <rect x="175" y="410" width="38" height="22" rx="3" fill="#0a0a0f" stroke="#00ff88" stroke-width="1"/>
  <text x="194" y="425" class="mono" font-size="12" fill="#00ff88" text-anchor="middle">llm</text>

  <rect x="221" y="410" width="56" height="22" rx="3" fill="#0a0a0f" stroke="#00ff88" stroke-width="1"/>
  <text x="249" y="425" class="mono" font-size="12" fill="#00ff88" text-anchor="middle">agents</text>

  <rect x="285" y="410" width="52" height="22" rx="3" fill="#0a0a0f" stroke="#00ff88" stroke-width="1"/>
  <text x="311" y="425" class="mono" font-size="12" fill="#00ff88" text-anchor="middle">code</text>

  <rect x="345" y="410" width="70" height="22" rx="3" fill="#0a0a0f" stroke="#00ff88" stroke-width="1"/>
  <text x="380" y="425" class="mono" font-size="12" fill="#00ff88" text-anchor="middle">thoughts</text>

  <text x="423" y="425" class="mono" font-size="14" fill="#1e1e30"> ]</text>

  <!-- Date -->
  <text x="1080" y="425" class="mono" font-size="13" fill="#303040" text-anchor="end">// 2026-04-14</text>

  <!-- Bottom prompt with blinking cursor -->
  <text x="120" y="496" class="mono" font-size="16" fill="#707080">~/sb$</text>
  <rect x="178" y="481" width="10" height="20" fill="#00ff88" opacity="0.9"/>

  <!-- Bottom site URL -->
  <text x="1080" y="510" class="mono" font-size="13" fill="#303040" text-anchor="end">sarveshbhatnagar.com</text>
</svg>
